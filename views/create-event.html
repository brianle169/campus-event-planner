<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Event</title>
    <link rel="stylesheet" href="../public/css/style.css" />
    <script src="../public/js/toast.js" defer></script>
    <script src="../public/js/eventFormValidations.js" type="module" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container">
        <a class="nav-brand" href="index.html">Campus Event Planner</a>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Toggle navigation"
          aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="admin-dashboard.html">Dashboard</a></li>
          <li><a href="manage-events.html">Manage Events</a></li>
          <li><a class="active" href="create-event.html">Create Event</a></li>
        </ul>
        <div class="nav-actions">
          <a class="btn btn-outline" href="login.html">Log out</a>
        </div>
      </nav>
    </header>

    <main class="admin container">
      <section class="admin-page-header">
        <div>
          <h1>Create a new event</h1>
          <p class="admin-subtitle">Fill in the details below.</p>
        </div>
      </section>

      <form class="event-form" data-toast="Event created" novalidate>
        <div class="event-form-grid">
          <div class="event-form-field event-form-field--full">
            <label for="title">Event title</label>
            <input type="text" id="title" name="title" required />
            <span class="field-error" id="title-error"></span>
          </div>

          <div class="event-form-field event-form-field--full">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="5" required></textarea>
            <span class="field-error" id="description-error"></span>
          </div>

          <div class="event-form-field">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="" disabled selected>Select a category</option>
              <option value="academic">Academic workshop</option>
              <option value="career">Career event</option>
              <option value="club">Club activity</option>
              <option value="sports">Sports event</option>
              <option value="cultural">Cultural event</option>
              <option value="volunteering">Volunteering event</option>
              <option value="social">Social event</option>
              <option value="lecture">Guest lecture</option>
              <option value="networking">Networking event</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="event-form-field">
            <label for="status">Status</label>
            <select id="status" name="status" required>
              <option value="open" selected>Open</option>
              <option value="full">Full</option>
              <option value="cancelled">Cancelled</option>
              <option value="completed">Completed</option>
              <option value="disabled">Disabled</option>
            </select>
          </div>

          <div class="event-form-field">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required />
            <span class="field-error" id="date-error"></span>
          </div>

          <div class="event-form-field">
            <label for="capacity">Capacity</label>
            <input type="number" id="capacity" name="capacity" min="1" required />
            <span class="field-error" id="capacity-error"></span>
          </div>

          <div class="event-form-field">
            <label for="start-time">Start time</label>
            <input type="time" id="start-time" name="start-time" required />
            <span class="field-error" id="start-time-error"></span>
          </div>

          <div class="event-form-field">
            <label for="end-time">End time</label>
            <input type="time" id="end-time" name="end-time" required />
            <span class="field-error" id="end-time-error"></span>
          </div>

          <div class="event-form-field event-form-field--full">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" required />
            <span class="field-error" id="location-error"></span>
          </div>

          <div class="event-form-field event-form-field--full">
            <label for="organizer">Organizer</label>
            <input type="text" id="organizer" name="organizer" value="Logged User" readonly />
          </div>
        </div>

        <div class="event-form-actions">
          <a class="btn btn-outline" href="manage-events.html">Cancel</a>
          <button class="btn btn-primary" type="submit">Create event</button>
        </div>
      </form>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small>&copy; 2026 Smart Campus Event Planner. SOEN 287 course project.</small>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
    </footer>
  </body>
</html>
