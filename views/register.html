<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="../public/css/style.css" />
    <script src="../public/js/main.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container">
        <a class="nav-brand" href="index.html">Campus Event Planner</a>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Toggle navigation"
          aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
          <a class="btn btn-outline" href="login.html">Log in</a>
          <a class="btn btn-primary" href="register.html">Sign up</a>
        </div>
      </nav>
    </header>

    <div class="register-container">
      <div class="register-header">
        <h1>Create a new account</h1>
        <p>
          Or <a href="/views/login.html">sign in to your existing account</a>
        </p>
      </div>
      <form class="register">
        <div class="register-field">
          <label>You are signing up as</label>
          <div>
            <button class="btn btn-outline" id="student-btn" type="button">
              Student
            </button>
            <button class="btn btn-outline" id="organizer-btn" type="button">
              Organizer
            </button>
          </div>
        </div>
        <div class="register-field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="register-field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="register-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <div class="register-field">
          <label for="password-confirm">Confirm password</label>
          <input
            type="password"
            id="password-confirm"
            name="password-confirm"
            required />
        </div>
        <button class="btn btn-primary" type="submit">Sign Up</button>
      </form>
    </div>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small
          >&copy; 2026 Smart Campus Event Planner. SOEN 287 course
          project.</small
        >
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
    </footer>
  </body>
</html>
