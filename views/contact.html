    <link rel="stylesheet" href="../public/css/style.css" />
</head>

<body>
    <header class="site-header">
        <nav class="nav container">
            <a class="nav-brand" href="index.html">Campus Event Planner</a>
            <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <a class="btn btn-outline" href="login.html">Log in</a>
                <a class="btn btn-primary" href="register.html">Sign up</a>
            </div>
        </nav>
    </header>

    <div class="contact-container">
        <div class="contact-header">
            <h1>Contact</h1>
            <p>
                Have a question, comment or feedback? <br> Fill out the form below.</a>
            </p>
        </div>
        <form class="contact">
            <div class="contact-field">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required />
            </div>
            <div class="contact-field">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required />
            </div>
            <div class="contact-field">
                <label for="text">Message</label>
                <textarea id="text" name="textarea" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Send</button>
        </form>
    </div>

    <footer class="site-footer">
        <div class="container footer-inner">

            <div class="footer-links">

            </div>
        </div>
    </footer>
</body>
